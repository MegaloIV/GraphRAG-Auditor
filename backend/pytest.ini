[pytest]
# Solo se ejecutan las pruebas vigentes. tests/deprecated/ queda fuera de la
# recolección: son pruebas de una versión anterior del código (veredictos
# VALIDA/INVALIDA, vector store en ChromaDB) que ya no se corresponden con el
# sistema actual (SUPPORTS/REFUTES/NO_INFO, pgvector en Supabase).
testpaths = tests/unit tests/integration
norecursedirs = deprecated .venv __pycache__

python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = -v --tb=short
